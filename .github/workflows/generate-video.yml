name: Generate Video

on:
  repository_dispatch:
    types: [generate-video]

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure Remotion browser
        run: npx remotion browser ensure
        working-directory: apps/api

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Generate video
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUFY_ACCESS_KEY: ${{ secrets.SUFY_ACCESS_KEY }}
          SUFY_SECRET_KEY: ${{ secrets.SUFY_SECRET_KEY }}
          SUFY_BUCKET_NAME: ${{ secrets.SUFY_BUCKET_NAME }}
          SUFY_ORIGIN_DOMAIN: ${{ secrets.SUFY_ORIGIN_DOMAIN }}
          SUFY_CDN_DOMAIN: ${{ secrets.SUFY_CDN_DOMAIN }}
          SUFY_URL_SIGNING_KEY: ${{ secrets.SUFY_URL_SIGNING_KEY }}
          REMOTION_GL: swiftshader
          VIDEO_ID: ${{ github.event.client_payload.videoId }}
          PHRASE: ${{ github.event.client_payload.phrase }}
          PRESET_COMPONENT: ${{ github.event.client_payload.presetComponent }}
          SOURCE_IMAGE_URL: ${{ github.event.client_payload.sourceImageUrl }}
          SOURCE_AUDIO_URL: ${{ github.event.client_payload.sourceAudioUrl }}
          DURATION_MS: ${{ github.event.client_payload.durationMs }}
          FADE_IN_MS: ${{ github.event.client_payload.fadeInMs }}
          FADE_OUT_MS: ${{ github.event.client_payload.fadeOutMs }}
          USER_ID: ${{ github.event.client_payload.userId }}
        run: npx ts-node -P tsconfig.json src/generator/run-job.ts
        working-directory: apps/api
